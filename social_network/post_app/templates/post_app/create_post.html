{% extends "base.html" %}
{% load static %}

{% block links %}
    <link rel="stylesheet" href="{% static 'post_app/css/create_post.css' %}">
{% endblock %}

{% block content %}
    <div class="create-post-page">
        <h1>Створити публікацію</h1>
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Опублікувати</button>
        </form>
    </div>
{% endblock %}
