{% load static %}

<section class="chat-messages group-chats">
    <div class="chat-block-header">
        <div class="header-left">
            <div class="header-icon-wrapper">
                <img src="{% static 'chat_app/icons/chat.svg' %}" alt="">
                <div class="notification-badge group-unread-badge">
                    <img src="{% static 'icons/logo/red_indicator.svg' %}" alt="">
                    <span></span>
                </div>
            </div>       
            <h3>Групові чати</h3>
        </div>
      
    </div>

   
<div class="chats-list">
    {% for chat in group_chats %} 
        <button type="button" class="chat-user-button" data-chat-id="{{ chat.id }}" data-chat-type="group">
            <div class="users-info-block">
                <div class="avatar-wrapper">
                    {% if chat.avatar %}
                        <img src="{{ chat.avatar.url }}" alt="">
                    {% else %}
                        <img src="{% static 'chat_app/icons/NP.png' %}" alt="">
                    {% endif %}
                </div>
                <div class="message-meta-wrapper">
                        <div class="meta-top">
                            <div class="chat-header-text">
                                <h4 class="user-name">{{ chat.name|default:'New group' }}</h4>
                            </div>
                            <span class="message-time">{{ chat.last_message_time }}</span>
                        </div>
                        <div class="meta-bottom">
                            <p class="user-message">{{ chat.last_message_text|default:'Почніть чат'|truncatechars:28 }}</p>
                        </div>
                    </div>
            </div>
        </button>
    {% endfor %}
</div>
</section>
