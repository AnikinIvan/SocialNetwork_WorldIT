{% load static %}
<section class="chat-main">
    <button id="open-panel">откритие панели</button>
    {% include 'chat_app/particles/chat_models_windows.html' %}
    
    <div class="chat-view">
        <div class="chat-header">
    <div class="chat-header-userinfo">
        <div id="chat-avatar" class="chat-avatar-wrapper">NG</div>
        
        <div class="chat-header-text-block">
            <h2 id="chat-title" class="chat-title">New Group</h2>
            <p id="chat-status" class="chat-status">3 учасники, 1 в мережі</p>
        </div>
    </div>
    
    <button type="button" class="btn-more-actions">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 8C13.1 8 14 7.1 14 6C14 4.9 13.1 4 12 4C10.9 4 10 4.9 10 6C10 7.1 10.9 8 12 8ZM12 10C10.9 10 10 10.9 10 12C10 13.1 10.9 14 12 14C13.1 14 14 13.1 14 12C14 10.9 13.1 10 12 10ZM12 16C10.9 16 10 16.9 10 18C10 19.1 10.9 20 12 20C13.1 20 14 19.1 14 18C14 16.9 13.1 16 12 16Z" fill="#707579"/>
            </svg>
    </button>
</div>

        <div id="chat-window" class="chat-window"></div>

        <form id="chat-message-form" class="chat-message-form">
            <input type="text" id="chat-input" placeholder="Повідомлення" autocomplete="off">

            <button type="button" class="btn-icon btn-secondary">
                <img src="{% static 'chat_app/icons/sticker.svg' %}" alt="Стикер">
            </button>

            <button type="button" class="btn-icon btn-secondary">
                <img src="{% static 'chat_app/icons/media.svg' %}" alt="Медиа">
            </button>

            <button type="submit" class="btn-icon btn-send">
                <img src="{% static 'chat_app/icons/send.svg' %}" alt="Відправити">
            </button>
        </form>
    </div>
</section>
