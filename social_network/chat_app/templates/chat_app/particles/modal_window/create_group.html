{% load static %}

<div class = "new-group-modal">  
    <div class = "header">
        <div class = "close-modal">
            <img src="{% static 'chat_app/icons/close_modal.svg' %}" alt="">
        </div> 
    </div>
    <h2>Нова група</h2>
    <div>
        <label for="make_a_name">Назва</label>
        <input placeholder = "Введіть назву" type = "text" class = "make-a-name" id = "make_a_name">
    </div>
    <div class = "indicator-and-buttons">
        <div class = "indicator">
            <img src="{% static 'chat_app/icons/Indicator.svg' %}" alt="">
        </div>
        <div class = "photo-buttons">
            <button class = "add-photo" type = "click">
                <img src="{% static 'chat_app/icons/plus.svg' %}" alt="">
                Додайте фото
            </button>
            <button class = "pick-photo" type = "click">
                <img src="{% static 'icons/modal/media.svg' %}" alt=""> 
                Оберіть фото
            </button>
        </div>
    </div>
    <div class = "members">
        <p>Учасники</p>
        <div class = "member">
            <img src="{% static 'chat_app/icons/NP.png' %}" alt="">
            <p>Aeslie Alexander</p>
            <div>
                <img src="{% static 'chat_app/icons/garbage.svg' %}" alt="">
            </div>
        </div>
    </div>
    <div class = "action-buttons">
        <button class = "back">
            <img src="{% static 'chat_app/icons/back.svg' %}" alt="">
        </button>
        <button class = "make-group"> 
            <img src="{% static 'chat_app/icons/make-group.svg' %}" alt=""> 
        </button>
    </div>
</div>
